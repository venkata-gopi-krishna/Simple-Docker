<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Colorful Webpage</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff7eb3, #ff758c, #ffca85, #8fd3f4, #84fab0);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: white;
            text-align: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 3rem;
            margin-top: 50px;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
        }

        p {
            font-size: 1.5rem;
        }

        .button {
            margin-top: 30px;
            padding: 15px 30px;
            border-radius: 12px;
            background-color: #ffffff;
            color: #ff4f81;
            font-size: 1.2rem;
            border: none;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .button:hover {
            transform: scale(1.1);
            background-color: #ffe6ef;
        }
    </style>
</head>

<body>
    <h1>🌈 Welcome to the Colorful Page!</h1>
    <p>This webpage is full of beautiful gradients and smooth animations.</p>


    <button class="button">Click Me!</button>
</body>
</html>
