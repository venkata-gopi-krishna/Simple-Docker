name: Build, Push Docker Image & Update Manifests

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
         
          tags: ${{ secrets.DOCKER_USERNAME }}/simple-html-app:${{ github.sha }}

      - name: Checkout manifests repository
        uses: actions/checkout@v4
        with:
          repository: venkata-gopi-krishna/simple-html-app-k8s
          token: ${{ secrets.MANIFESTS_REPO_PAT }}
          path: manifests

      - name: Update deployment.yaml in manifests repo
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/simple-html-app:latest|" manifests/deployment.yaml

      - name: Commit & Push updated manifests
        run: |
          cd manifests
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add deployment.yaml
          git commit -m "Update image tag to latest"
          git push
