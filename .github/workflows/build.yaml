name: Build, Push Docker Image & Update Manifests

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout app repo
      - name: Checkout app repository
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Build Docker image with unique tag (commit SHA)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/simple-html-app:latest
            ${{ secrets.DOCKER_USERNAME }}/simple-html-app:${{ github.sha }}

      # Step 5: Checkout manifests repo
      - name: Checkout manifests repository
        uses: actions/checkout@v4
        with:
          repository: venkata-gopi-krishna/simple-html-app-k8s
          token: ${{ secrets.MANIFESTS_REPO_PAT }}   # Use a PAT with write access
          path: manifests

      # Step 6: Update deployment.yaml with new image tag
      - name: Update deployment.yaml in manifests repo
        run: |
          IMAGE_TAG="${{ secrets.DOCKER_USERNAME }}/simple-html-app:${{ github.sha }}"
          sed -i "s|image: .*|image: $IMAGE_TAG|" manifests/deployment.yaml

      # Step 7: Commit & push only if changes exist
      - name: Commit & Push updated manifests
        run: |
          cd manifests
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add deployment.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update image tag to ${{ github.sha }}"
            git push
          fi
